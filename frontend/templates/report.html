{% extends "base.html" %}

{% block title %}{{ filename }} - Docker Registry Cleaner{% endblock %}

{% block extra_css %}
<style>
    .json-viewer {
        background: #111;
        color: #e5e7eb;
        padding: 20px;
        border-radius: 4px;
        overflow-x: auto;
        font-family: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
        font-size: 13px;
        line-height: 1.5;
    }
    .json-viewer pre {
        margin: 0;
        white-space: pre-wrap;
        word-wrap: break-word;
    }
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
    }
    .stat-card {
        background: white;
        border: 1px solid #e5e7eb;
        padding: 20px;
        border-radius: 6px;
        text-align: center;
    }
    .stat-value {
        font-size: 1.9em;
        font-weight: 700;
        color: #111;
        margin: 8px 0 4px;
        letter-spacing: -0.02em;
    }
    .stat-value.accent {
        color: #FF6800;
    }
    .stat-label {
        font-size: 0.8em;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }
    .dry-run-badge {
        display: inline-block;
        background: #fef3c7;
        color: #92400e;
        border: 1px solid #fcd34d;
        padding: 4px 12px;
        border-radius: 4px;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 16px;
    }
    .apply-badge {
        display: inline-block;
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fca5a5;
        padding: 4px 12px;
        border-radius: 4px;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 16px;
    }
    .tabs {
        display: flex;
        border-bottom: 2px solid #e5e7eb;
        margin-bottom: 20px;
    }
    .tab {
        padding: 10px 20px;
        cursor: pointer;
        border: none;
        background: none;
        font-size: 0.95rem;
        color: #888;
        transition: color 0.2s;
        font-weight: 500;
    }
    .tab:hover {
        color: #333;
    }
    .tab.active {
        color: #FF6800;
        border-bottom: 2px solid #FF6800;
        margin-bottom: -2px;
    }
    .tab-content {
        display: none;
    }
    .tab-content.active {
        display: block;
    }
    .section-title {
        font-size: 0.85rem;
        font-weight: 600;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 24px 0 12px;
    }
    .breakdown-grid {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }
    .breakdown-item {
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
        padding: 8px 16px;
        font-size: 0.9rem;
    }
    .breakdown-item strong {
        color: #111;
    }
    .breakdown-label {
        color: #888;
        font-size: 0.8rem;
        margin-left: 4px;
    }
    .no-summary {
        padding: 24px;
        color: #888;
        font-style: italic;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <a href="{{ url_for('index') }}" class="back-link">← Back to Reports</a>
    <h2>{{ filename }}</h2>
</div>

<div class="tabs">
    <button class="tab active" onclick="switchTab('summary', event)">Summary</button>
    <button class="tab" onclick="switchTab('raw', event)">Raw JSON</button>
</div>

<div id="summary-tab" class="tab-content active">
    <div id="report-summary">
        <div class="loading">Loading report summary...</div>
    </div>
</div>

<div id="raw-tab" class="tab-content">
    <div class="json-viewer">
        <pre>{{ report_data }}</pre>
    </div>
</div>

<script>
const reportData = {{ report_data | safe }};
const reportType = "{{ report_type }}";
const dominoUrl = {{ domino_url | tojson }};

// ── Domino link helpers ──────────────────────────────────────────────────────

function link(url, text) {
    const display = text || url || '—';
    if (!url) return display;
    return `<a href="${url}" target="_blank" rel="noopener">${display}</a>`;
}

function runUrl(ownerLogin, projectName, runId) {
    if (!dominoUrl || !ownerLogin || !projectName || !runId) return null;
    return `${dominoUrl}/jobs/${encodeURIComponent(ownerLogin)}/${encodeURIComponent(projectName)}/${encodeURIComponent(runId)}/details?status=all`;
}

function workspaceUrl(ownerLogin, projectName, wsId) {
    if (!dominoUrl || !ownerLogin || !projectName || !wsId) return null;
    return `${dominoUrl}/workspace/${encodeURIComponent(ownerLogin)}/${encodeURIComponent(projectName)}?wsId=${encodeURIComponent(wsId)}&sharedView=true`;
}

function modelVersionUrl(modelId, versionId, ownerLogin) {
    if (!dominoUrl || !modelId || !versionId) return null;
    const q = ownerLogin ? `?ownerName=${encodeURIComponent(ownerLogin)}` : '';
    return `${dominoUrl}/models/${encodeURIComponent(modelId)}/versions/${encodeURIComponent(versionId)}${q}`;
}

function projectUrl(ownerLogin, projectName) {
    if (!dominoUrl || !ownerLogin || !projectName) return null;
    return `${dominoUrl}/u/${encodeURIComponent(ownerLogin)}/${encodeURIComponent(projectName)}/overview`;
}

function orgUrl(name) {
    if (!dominoUrl || !name) return null;
    return `${dominoUrl}/u/${encodeURIComponent(name)}#environment`;
}

function appVersionUrl(appId, versionId) {
    if (!dominoUrl || !appId || !versionId) return null;
    return `${dominoUrl}/global-apps/${encodeURIComponent(appId)}/${encodeURIComponent(versionId)}/details/overview`;
}

function switchTab(tabName, event) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(tabName + '-tab').classList.add('active');
}

function formatBytes(bytes) {
    if (!bytes || bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function formatGb(gb) {
    if (!gb && gb !== 0) return '—';
    if (gb >= 1) return gb.toFixed(2) + ' GB';
    return (gb * 1024).toFixed(1) + ' MB';
}

function stat(label, value, accent) {
    const cls = accent ? 'stat-value accent' : 'stat-value';
    return `<div class="stat-card">
        <div class="stat-label">${label}</div>
        <div class="${cls}">${value ?? '—'}</div>
    </div>`;
}

function table(headers, rows) {
    if (!rows || !rows.length) return '<p class="no-summary">No items to display.</p>';
    const ths = headers.map(h => `<th>${h}</th>`).join('');
    const trs = rows.map(cells =>
        '<tr>' + cells.map(c => `<td>${c ?? '—'}</td>`).join('') + '</tr>'
    ).join('');
    return `<div class="table-wrapper"><table class="data-table">
        <thead><tr>${ths}</tr></thead>
        <tbody>${trs}</tbody>
    </table></div>`;
}

function sectionTitle(text) {
    return `<div class="section-title">${text}</div>`;
}

// ── Shared usage details renderer ───────────────────────────────────────────
// Renders a UsageInfo-shaped object (runs/workspaces/models/organizations/app_versions)
// as HTML tables with Domino links. Used by both the MongoDB usage report and the
// deletion results report.
function renderUsageDetails(usage) {
    let html = '';

    const runs = usage.runs || [];
    const runsCount = usage.runs_count || runs.length;
    if (runsCount > 0) {
        const suffix = runs.length > 0 && runsCount > runs.length ? ` — showing ${runs.length} of ${runsCount}` : '';
        html += sectionTitle(`Runs (${runsCount}${suffix})`);
        if (runs.length) {
            const rows = runs.map(r => {
                const owner = r.project_owner_login || r.project_owner_name || '';
                const url = runUrl(r.project_owner_login, r.project_name, r.run_id);
                const label = r.project_name ? `${owner ? owner + ' / ' : ''}${r.project_name}` : r.run_id;
                return [link(url, label), r.status || '—', r.run_id || '—'];
            });
            html += table(['Project', 'Status', 'Run ID'], rows);
        } else {
            html += `<p style="color:#888;font-style:italic;margin:4px 0 12px;">Re-run Extract Metadata to populate run details and links.</p>`;
        }
    }

    const workspaces = usage.workspaces || [];
    const wsCount = usage.workspaces_count || workspaces.length;
    if (wsCount > 0) {
        const suffix = workspaces.length > 0 && wsCount > workspaces.length ? ` — showing ${workspaces.length} of ${wsCount}` : '';
        html += sectionTitle(`Workspaces (${wsCount}${suffix})`);
        if (workspaces.length) {
            const rows = workspaces.map(ws => {
                const wsId = ws.workspace_id || ws._id;
                const url = workspaceUrl(ws.user_login, ws.project_name, wsId);
                return [link(url, ws.workspace_name || wsId || '—'), ws.project_name || '—'];
            });
            html += table(['Workspace', 'Project'], rows);
        } else {
            html += `<p style="color:#888;font-style:italic;margin:4px 0 12px;">Re-run Extract Metadata to populate workspace details and links.</p>`;
        }
    }

    const models = usage.models || [];
    const modelsCount = usage.models_count || models.length;
    if (modelsCount > 0) {
        const suffix = models.length > 0 && modelsCount > models.length ? ` — showing ${models.length} of ${modelsCount}` : '';
        html += sectionTitle(`Models (${modelsCount}${suffix})`);
        if (models.length) {
            const rows = models.map(m => {
                const vId = m.version_id || m._version_id;
                const url = modelVersionUrl(m.model_id, vId, m.model_owner_login);
                return [link(url, m.model_name || m.model_id || '—'), m.model_owner || m.model_owner_login || '—', vId || '—'];
            });
            html += table(['Model', 'Owner', 'Version ID'], rows);
        } else {
            html += `<p style="color:#888;font-style:italic;margin:4px 0 12px;">Re-run Extract Metadata to populate model details and links.</p>`;
        }
    }

    const schedulerJobs = usage.scheduler_jobs || [];
    if (schedulerJobs.length) {
        html += sectionTitle(`Scheduler Jobs (${schedulerJobs.length})`);
        const rows = schedulerJobs.map(j => [
            j.jobName || j._id || '—',
            j.projectId || '—',
        ]);
        html += table(['Job Name', 'Project ID'], rows);
    }

    const projects = usage.projects || [];
    if (projects.length) {
        html += sectionTitle(`Projects (${projects.length})`);
        const rows = projects.map(p => {
            const url = projectUrl(p.owner_login, p.name);
            return [link(url, p.name || p._id || '—'), p.owner_login || p.ownerId || '—'];
        });
        html += table(['Project', 'Owner'], rows);
    }

    const orgs = usage.organizations || [];
    if (orgs.length) {
        html += sectionTitle(`Organizations (${orgs.length})`);
        const rows = orgs.map(o => {
            const name = o.name || o.organization_name;
            return [link(orgUrl(name), name || o._id || '—')];
        });
        html += table(['Organization'], rows);
    }

    const appVersions = usage.app_versions || [];
    if (appVersions.length) {
        html += sectionTitle(`App Versions (${appVersions.length})`);
        const rows = appVersions.map(a => {
            const vId = a._id || a.app_version_id;
            const url = appVersionUrl(a.appId || a.app_id, vId);
            return [link(url, `v${a.versionNumber ?? a.version_number ?? '?'} — App ${a.appId || a.app_id || '—'}`)];
        });
        html += table(['App Version'], rows);
    }

    return html;
}

// ── Report renderers ────────────────────────────────────────────────────────

function renderUnusedEnvironmentsReport(data) {
    const s = data.summary || {};
    let html = '<div class="stats-grid">';
    html += stat('Unused Environment IDs', s.total_unused_environment_ids);
    html += stat('Matching Tags', s.total_matching_tags);
    html += stat('Space Reclaimable', formatGb(s.freed_space_gb), true);
    html += '</div>';

    // Flatten grouped_by_object_id into rows
    const grouped = data.grouped_by_object_id || {};
    const rows = [];
    Object.values(grouped).forEach(tags => {
        (Array.isArray(tags) ? tags : [tags]).forEach(item => {
            rows.push([
                item.env_name || item.object_id || '—',
                item.image_type || '—',
                item.tag || '—',
                formatBytes(item.size_bytes),
                item.usage_summary || '—',
            ]);
        });
    });

    if (rows.length) {
        html += sectionTitle('Unused Environments');
        html += table(['Name / Object ID', 'Type', 'Tag', 'Size', 'Usage'], rows);
    }
    return html;
}

function renderArchivedTagsReport(data) {
    const s = data.summary || {};
    let html = '<div class="stats-grid">';
    html += stat('Archived Object IDs', s.total_archived_object_ids);
    html += stat('Matching Tags', s.total_matching_tags);
    html += stat('Space Reclaimable', formatGb(s.freed_space_gb), true);
    html += '</div>';

    // Breakdown by image type
    if (s.tags_by_image_type && Object.keys(s.tags_by_image_type).length) {
        html += sectionTitle('By Image Type');
        html += '<div class="breakdown-grid">';
        Object.entries(s.tags_by_image_type).forEach(([type, count]) => {
            html += `<div class="breakdown-item"><strong>${count}</strong><span class="breakdown-label">${type}</span></div>`;
        });
        html += '</div>';
    }

    // Top archived tags table
    const items = data.archived_tags || [];
    if (items.length) {
        html += sectionTitle(`Archived Tags (${items.length} total)`);
        const rows = items.slice(0, 100).map(item => [
            item.image_type || '—',
            item.tag || '—',
            formatBytes(item.size_bytes),
            item.usage_summary || '—',
        ]);
        html += table(['Type', 'Tag', 'Size', 'Usage'], rows);
    }
    return html;
}

function renderMongoDBUsageReport(data) {
    // Group assets by docker tag (mirrors Python's extract_docker_tags_with_usage_info)
    const usageByTag = {};

    function ensureTag(tag) {
        if (!tag) return false;
        if (!usageByTag[tag]) usageByTag[tag] = { runs: [], workspaces: [], models: [], organizations: [], app_versions: [] };
        return true;
    }

    (data.runs || []).forEach(r => {
        if (ensureTag(r.environment_docker_tag)) usageByTag[r.environment_docker_tag].runs.push(r);
    });

    const WS_TAG_FIELDS = [
        'environment_docker_tag',
        'project_default_environment_docker_tag',
        'compute_environment_docker_tag',
        'session_environment_docker_tag',
        'session_compute_environment_docker_tag',
    ];
    (data.workspaces || []).forEach(ws => {
        WS_TAG_FIELDS.forEach(field => {
            if (ensureTag(ws[field])) usageByTag[ws[field]].workspaces.push({ ...ws, _usage_field: field });
        });
    });

    (data.models || []).forEach(m => {
        (m.model_active_versions || []).forEach(v => {
            ['model_environment_tag', 'base_environment_tag'].forEach(f => {
                if (ensureTag(v[f])) usageByTag[v[f]].models.push({ ...m, _version_id: v.model_version_id });
            });
        });
    });

    (data.organizations || []).forEach(o => {
        if (ensureTag(o.environment_docker_tag)) usageByTag[o.environment_docker_tag].organizations.push(o);
    });

    (data.app_versions || []).forEach(a => {
        if (ensureTag(a.environment_docker_tag)) usageByTag[a.environment_docker_tag].app_versions.push(a);
    });

    const allTags = Object.keys(usageByTag).sort();

    let html = '<div class="stats-grid">';
    html += stat('In-Use Images', allTags.length);
    html += stat('Runs', (data.runs || []).length);
    html += stat('Workspaces', (data.workspaces || []).length);
    html += stat('Models', (data.models || []).length);
    html += stat('Scheduler Jobs', (data.scheduler_jobs || []).length);
    html += stat('App Versions', (data.app_versions || []).length);
    html += '</div>';

    if (!allTags.length) return html;

    html += sectionTitle(`In-Use Images (${allTags.length})`);

    allTags.forEach(tag => {
        const usage = usageByTag[tag];
        const shortTag = tag.length > 80 ? tag.slice(0, 77) + '…' : tag;
        const totalAssets = usage.runs.length + usage.workspaces.length + usage.models.length
            + usage.organizations.length + usage.app_versions.length;
        const badge = `<span style="float:right;color:#888;font-size:0.8em;font-family:sans-serif;">${totalAssets} asset${totalAssets !== 1 ? 's' : ''}</span>`;

        html += `<details style="margin-bottom:8px;border:1px solid #e5e7eb;border-radius:4px;">
            <summary style="padding:10px 14px;cursor:pointer;background:#f9fafb;border-radius:4px;font-family:monospace;font-size:0.82rem;list-style:none;display:flex;justify-content:space-between;align-items:center;">
                <span>${shortTag}</span>${badge}
            </summary>
            <div style="padding:8px 14px 14px;">`;

        if (usage.runs.length) {
            html += sectionTitle(`Runs (${usage.runs.length})`);
            const rows = usage.runs.map(r => {
                const owner = r.project_owner_login || r.project_owner_name || '';
                const url = runUrl(r.project_owner_login, r.project_name, r.run_id);
                const label = r.project_name ? `${owner ? owner + ' / ' : ''}${r.project_name}` : r.run_id;
                return [link(url, label), r.status || '—', r.run_id || '—'];
            });
            html += table(['Project', 'Status', 'Run ID'], rows);
        }

        if (usage.workspaces.length) {
            html += sectionTitle(`Workspaces (${usage.workspaces.length})`);
            const rows = usage.workspaces.map(ws => {
                const wsId = ws._id || ws.workspace_id;
                const url = workspaceUrl(ws.user_login, ws.project_name, wsId);
                const usageType = (ws._usage_field || '').replace('_docker_tag', '').replace(/_/g, ' ').trim() || '—';
                return [link(url, ws.workspace_name || wsId || '—'), ws.project_name || '—', usageType];
            });
            html += table(['Workspace', 'Project', 'Usage Type'], rows);
        }

        if (usage.models.length) {
            html += sectionTitle(`Models (${usage.models.length})`);
            const rows = usage.models.map(m => {
                const url = modelVersionUrl(m.model_id, m._version_id, m.model_owner_login);
                return [link(url, m.model_name || m.model_id || '—'), m.model_owner || '—', m._version_id || '—'];
            });
            html += table(['Model', 'Owner', 'Version ID'], rows);
        }

        if (usage.organizations.length) {
            html += sectionTitle(`Organizations (${usage.organizations.length})`);
            const rows = usage.organizations.map(o => {
                const url = orgUrl(o.organization_name);
                return [link(url, o.organization_name || o.organization_id || '—')];
            });
            html += table(['Organization'], rows);
        }

        if (usage.app_versions.length) {
            html += sectionTitle(`App Versions (${usage.app_versions.length})`);
            const rows = usage.app_versions.map(a => {
                const url = appVersionUrl(a.app_id, a.app_version_id);
                return [link(url, `v${a.version_number ?? '?'} — App ${a.app_id || '—'}`)];
            });
            html += table(['App Version'], rows);
        }

        html += '</div></details>';
    });

    return html;
}

function renderSizeReport(data) {
    const s = data.summary || {};
    let html = '<div class="stats-grid">';

    if (data.users !== undefined) {
        // user-size report
        html += stat('Users', s.total_users);
        html += stat('Images', s.total_images);
        html += stat('Total Size', formatBytes(s.total_size_bytes));
        html += stat('Max Reclaimable', formatBytes(s.total_freed_if_all_deleted_bytes), true);
        html += '</div>';

        if ((data.users || []).length) {
            html += sectionTitle('Users by Size');
            const rows = (data.users || []).map(u => [
                u.user_name || u.login_id || u.user_id || '—',
                u.image_count,
                formatBytes(u.total_size_bytes),
                formatBytes(u.freed_space_bytes),
            ]);
            html += table(['User', 'Images', 'Total Size', 'Reclaimable'], rows);
        }
    } else {
        // image-size report
        html += stat('Images', s.total_images);
        html += stat('Total Size', formatBytes(s.total_size_bytes));
        html += stat('Max Reclaimable', formatBytes(s.total_freed_if_all_deleted_bytes), true);
        html += '</div>';

        if ((data.images || []).length) {
            html += sectionTitle('Images by Size');
            const rows = (data.images || []).slice(0, 100).map(img => [
                img.image_type || '—',
                img.user_name || img.owner_login_id || '—',
                img.tag || '—',
                formatBytes(img.total_size_bytes),
                formatBytes(img.freed_space_bytes),
            ]);
            html += table(['Type', 'Owner', 'Tag', 'Total Size', 'Reclaimable'], rows);
        }
    }
    return html;
}

function renderDeletionResultsReport(data) {
    const s = data.summary || {};
    let html = '';

    if (data.dry_run === true) {
        html += '<div class="dry-run-badge">Dry-run — no changes made</div>';
    } else if (data.dry_run === false) {
        html += '<div class="apply-badge">Apply — changes were made</div>';
    }

    html += '<div class="stats-grid">';
    html += stat('Deleted', s.successful_deletions);
    html += stat('Failed', s.failed_deletions);
    html += stat('Used (skipped)', s.used_images);
    html += stat('Space Freed', formatBytes(s.total_size_deleted_bytes), true);
    html += '</div>';

    if ((data.deleted_images || []).length) {
        html += sectionTitle('Deleted Images');
        const rows = (data.deleted_images || []).map(img => [
            img.tag || '—',
            formatBytes(img.size_bytes),
            img.status || '—',
        ]);
        html += table(['Tag', 'Size', 'Status'], rows);
    }

    if ((data.failed_deletions || []).length) {
        html += sectionTitle('Failed Deletions');
        const rows = (data.failed_deletions || []).map(img => [
            img.tag || '—',
            formatBytes(img.size_bytes),
        ]);
        html += table(['Tag', 'Size'], rows);
    }

    const usedImages = data.used_images || [];
    if (usedImages.length) {
        html += sectionTitle(`Protected Images — In Use (${usedImages.length})`);
        usedImages.forEach(img => {
            const shortTag = (img.tag || '').length > 80 ? img.tag.slice(0, 77) + '…' : (img.tag || '—');
            const usage = img.usage || {};

            // Build inline linked asset items for the summary line (first 5 across all types)
            const summaryItems = [];
            (usage.runs || []).forEach(r => {
                const url = runUrl(r.project_owner_login, r.project_name, r.run_id);
                const label = r.project_name
                    ? `${r.project_owner_login || r.project_owner_name || ''}/${r.project_name}`
                    : r.run_id;
                summaryItems.push(`<span style="font-size:0.75em;color:#666;font-family:sans-serif;">Run:</span> ${link(url, label)}`);
            });
            (usage.workspaces || []).forEach(ws => {
                const wsId = ws.workspace_id || ws._id;
                const url = workspaceUrl(ws.user_login, ws.project_name, wsId);
                summaryItems.push(`<span style="font-size:0.75em;color:#666;font-family:sans-serif;">Workspace:</span> ${link(url, ws.workspace_name || wsId || '—')}`);
            });
            (usage.models || []).forEach(m => {
                const vId = m.version_id || m._version_id;
                const url = modelVersionUrl(m.model_id, vId, m.model_owner_login);
                summaryItems.push(`<span style="font-size:0.75em;color:#666;font-family:sans-serif;">Model:</span> ${link(url, m.model_name || m.model_id || '—')}`);
            });
            (usage.organizations || []).forEach(o => {
                const name = o.name || o.organization_name;
                summaryItems.push(`<span style="font-size:0.75em;color:#666;font-family:sans-serif;">Org:</span> ${link(orgUrl(name), name || '—')}`);
            });
            (usage.app_versions || []).forEach(a => {
                const vId = a._id || a.app_version_id;
                const url = appVersionUrl(a.appId || a.app_id, vId);
                summaryItems.push(`<span style="font-size:0.75em;color:#666;font-family:sans-serif;">App:</span> ${link(url, `v${a.versionNumber ?? a.version_number ?? '?'}`)}`);
            });

            const INLINE_LIMIT = 5;
            const visibleItems = summaryItems.slice(0, INLINE_LIMIT);
            const overflow = summaryItems.length - visibleItems.length;
            const inlineLinks = visibleItems.join('<span style="color:#ccc;margin:0 6px;">·</span>');
            const overflowNote = overflow > 0
                ? `<span style="color:#888;font-size:0.8em;font-family:sans-serif;"> +${overflow} more</span>`
                : '';

            html += `<details style="margin-bottom:8px;border:1px solid #fde68a;border-radius:4px;">
                <summary style="padding:10px 14px;cursor:pointer;background:#fefce8;border-radius:4px;list-style:none;">
                    <div style="font-family:monospace;font-size:0.82rem;margin-bottom:${summaryItems.length ? '6px' : '0'};">${shortTag}</div>
                    ${summaryItems.length ? `<div style="font-size:0.85rem;">${inlineLinks}${overflowNote}</div>` : ''}
                </summary>
                <div style="padding:8px 14px 14px;">
                    ${renderUsageDetails(usage) || `<p style="color:#888;font-style:italic;margin:8px 0;">${img.why_cannot_delete || 'Usage detail not available in this report — re-run Extract Metadata to populate.'}</p>`}
                </div>
            </details>`;
        });
    }

    return html;
}

function renderFinalReport(data) {
    const s = data.summary || data;
    let html = '<div class="stats-grid">';
    if (s.total_images !== undefined) html += stat('Total Images', s.total_images);
    if (s.total_size_bytes !== undefined) html += stat('Total Size', formatBytes(s.total_size_bytes));
    if (s.total_layers !== undefined) html += stat('Total Layers', s.total_layers);
    html += '</div>';
    return html;
}

function renderGenericReport(data) {
    // Try to surface a summary block if present
    let html = '';
    if (data.summary && typeof data.summary === 'object') {
        html += '<div class="stats-grid">';
        Object.entries(data.summary).forEach(([key, val]) => {
            if (typeof val === 'number' || typeof val === 'string') {
                const label = key.replaceAll('_', ' ');
                const display = typeof val === 'number' && key.includes('bytes')
                    ? formatBytes(val)
                    : String(val);
                html += stat(label, display);
            }
        });
        html += '</div>';
    }
    if (!html) {
        html = `<div class="info-box">
            <h3>Report Data</h3>
            <p>This report contains ${Object.keys(data).length} top-level fields. View the Raw JSON tab for complete details.</p>
        </div>`;
    }
    return html;
}

function renderIntegrityCheckReport(data) {
    const s = data.summary || {};
    let html = '<div class="stats-grid">';
    html += stat('Environments', s.environments_checked);
    html += stat('Revisions', s.revisions_checked);
    html += stat('Models', s.models_checked);
    html += stat('Model Versions', s.versions_checked);
    html += stat('Issues Found', s.total_issues, s.total_issues > 0);
    if (s.orphaned_with_image !== undefined) {
        html += stat('Orphaned (has image)', s.orphaned_with_image, s.orphaned_with_image > 0);
        html += stat('Orphaned (no image)', s.orphaned_without_image);
    }
    html += '</div>';

    const byType = s.issues_by_type || {};
    if (Object.keys(byType).length) {
        html += sectionTitle('Issues by Type');
        html += '<div class="breakdown-grid">';
        Object.entries(byType).forEach(([type, count]) => {
            html += `<div class="breakdown-item"><strong>${count}</strong><span class="breakdown-label">${type.replace(/_/g, ' ')}</span></div>`;
        });
        html += '</div>';
    }

    const orphanedTypes = new Set(['orphaned_revision', 'orphaned_model_version']);
    const issues = data.issues || [];
    if (issues.length) {
        const hasOrphaned = issues.some(i => orphanedTypes.has(i.issue_type));
        html += sectionTitle(`Integrity Issues (${issues.length} total)`);
        const headers = ['Collection', 'Issue Type', 'Document ID', 'Referenced ID', 'Description'];
        if (hasOrphaned) headers.push('Has Image?');
        const rows = issues.map(issue => {
            const row = [
                issue.collection || '—',
                issue.issue_type ? issue.issue_type.replace(/_/g, ' ') : '—',
                issue.document_id || '—',
                issue.referenced_id || '—',
                issue.description || '—',
            ];
            if (hasOrphaned) {
                if (!orphanedTypes.has(issue.issue_type)) {
                    row.push('—');
                } else if (issue.has_image === true) {
                    row.push('<span style="color:var(--warning,orange);font-weight:600">Yes — investigate</span>');
                } else if (issue.has_image === false) {
                    row.push('<span style="color:var(--success,green)">No — safe to clean</span>');
                } else {
                    row.push('<span style="color:var(--muted,grey)">Unknown</span>');
                }
            }
            return row;
        });
        html += table(headers, rows);
    } else {
        html += `<p style="color: var(--success, green); margin-top: 1rem;">No integrity issues found.</p>`;
    }

    return html;
}

// ── Bootstrap ───────────────────────────────────────────────────────────────

function renderSummary() {
    const summaryDiv = document.getElementById('report-summary');
    let html = '';
    if      (reportType === 'size_report')           html = renderSizeReport(reportData);
    else if (reportType === 'mongodb_usage')         html = renderMongoDBUsageReport(reportData);
    else if (reportType === 'archived_tags')         html = renderArchivedTagsReport(reportData);
    else if (reportType === 'unused_environments')   html = renderUnusedEnvironmentsReport(reportData);
    else if (reportType === 'deletion_results')      html = renderDeletionResultsReport(reportData);
    else if (reportType === 'final_report')          html = renderFinalReport(reportData);
    else if (reportType === 'integrity_check')       html = renderIntegrityCheckReport(reportData);
    else                                             html = renderGenericReport(reportData);
    summaryDiv.innerHTML = html;
}

renderSummary();
</script>
{% endblock %}

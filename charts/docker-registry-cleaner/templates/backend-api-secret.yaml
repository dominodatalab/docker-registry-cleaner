{{- $secretName := (.Values.backendApi | default dict).apiKeySecret | default "registry-cleaner-api-key" -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "docker-registry-cleaner.name" . }}
    helm.sh/chart: {{ include "docker-registry-cleaner.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    # Preserve the secret across helm uninstall so a reinstall reuses the same key.
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if $existing }}
  api-key: {{ index $existing.data "api-key" }}
  {{- else }}
  api-key: {{ randAlphaNum 32 | b64enc }}
  {{- end }}

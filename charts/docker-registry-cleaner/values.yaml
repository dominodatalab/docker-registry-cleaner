image:
  repository: quay.io/domino/docker-registry-cleaner
  tag: v0.3.4
  pullPolicy: Always

# fsGroup makes the PVC at /data/reports writable by nonroot (65532)
podSecurityContext:
  fsGroup: 65532

# Resource requests and limits for the container
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Optional env overrides for external registries (ECR, Quay, GCR, ACR, etc.)
# Registry URL is set via config.registry.url below.
env:
  registryAuthSecret: ""  # Name of a K8s secret with .dockerconfigjson for secure credential storage
  azureClientId: ""       # Client ID of the managed identity for ACR auth
  azureTenantId: ""       # Azure AD tenant ID for ACR auth

imagePullSecrets:
  - name: domino-quay-repos

serviceAccount:
  create: true
  name: docker-registry-cleaner
  # Optional: override full name; by default uses release-name + chart name
  fullnameOverride: ""

dominoPlatformNamespace: domino-platform

# Domino API configuration for admin authentication.
# The frontend validates each request by forwarding the user's dominoAuth
# cookie to the nucleus-frontend service and checking isAdmin on the principal.
# Override apiUrl only if your nucleus-frontend service uses a non-standard
# address; by default it is derived from dominoPlatformNamespace above.
domino:
  apiUrl: ""  # e.g. http://nucleus-frontend.domino-platform.svc.cluster.local

persistence:
  enabled: true
  size: 10Gi
  storageClass: "dominodisk"  # Use default storage class if empty

# Backend API configuration
# The backend container exposes a REST API on port 8081 for the frontend sidecar.
# This port is NOT exposed by any Kubernetes Service — it is only reachable from
# within the pod (i.e. by the frontend sidecar via localhost).
backendApi:
  port: 8081
  # Name of the Kubernetes Secret that holds the API key used to authenticate
  # frontend→backend requests. The chart creates this secret automatically with a
  # random 32-character key on first install and preserves it across upgrades and
  # reinstalls (helm.sh/resource-policy: keep). Override apiKeySecret to use a
  # pre-existing secret instead.
  apiKeySecret: "registry-cleaner-api-key"

# Frontend web UI configuration (runs as sidecar in StatefulSet)
frontend:
  enabled: true
  networkPolicy:
    enabled: true
    # Label on the namespace that contains the nginx ingress controller.
    # Traffic is allowed from any pod in a namespace bearing this label.
    ingressNamespaceLabel:
      domino-platform: "true"
  image:
    repository: quay.io/domino/docker-registry-cleaner-frontend
    tag: v0.3.4
    pullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  # Subpath under the Domino hostname where the UI will be served.
  # Must match the path in ingress.hosts and the nginx rewrite rule.
  basePath: /registry-cleaner
  ingress:
    enabled: true
    className: nginx
    # Nginx rewrites /registry-cleaner/foo → /foo before forwarding to Flask.
    # FLASK_BASE_PATH (= frontend.basePath) tells Flask its SCRIPT_NAME so that
    # url_for() generates correct prefixed URLs — no configuration-snippet needed.
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /$2
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    hosts:
      - host: "domino.example.com"
        paths:
          - path: /registry-cleaner(/|$)(.*)
            pathType: ImplementationSpecific
    tls: []

config:
  # Inline config.yaml content mounted into the container
  registry:
    url: "docker-registry:5000"
    repository: "dominodatalab"
  mongo:
    host: "mongodb-replicaset"
    port: 27017
    replicaset: "rs0"
    db: "domino"
  analysis:
    max_workers: 4
    timeout: 300
    output_dir: "/data/reports"
  retry:
    max_retries: 3
    initial_delay: 1.0
    max_delay: 60.0
    exponential_base: 2.0
    jitter: true
    timeout: 300
  cache:
    enabled: true
    tag_list_ttl: 1800
    tag_list_max_size: 100
    image_inspect_ttl: 3600
    image_inspect_max_size: 1000
    mongo_query_ttl: 600
    mongo_query_max_size: 500
    layer_calc_ttl: 7200
    layer_calc_max_size: 2000
  s3:
    bucket: ""
    region: "us-west-2"
  skopeo:
    rate_limit:
      enabled: true  # Enable rate limiting for registry operations
      requests_per_second: 10.0  # Maximum requests per second (adjust based on registry capacity)
      burst_size: 20  # Allow burst of up to N requests (helps with parallel operations)
  reports:
    archived_tags: "archived-tags.json"
    deletion_analysis: "deletion-analysis.json"
    filtered_layers: "filtered-layers.json"
    image_analysis: "final-report.json"
    images_report: "images-report"
    layers_and_sizes: "layers-and-sizes.json"
    mongodb_usage: "mongodb_usage_report.json"
    tags_per_layer: "tags-per-layer.json"
    tag_sums: "tag-sums.json"
    unused_references: "unused-references.json"
  security:
    dry_run_by_default: true
    require_confirmation: true

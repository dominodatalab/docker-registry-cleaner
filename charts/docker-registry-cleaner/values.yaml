# ── Frontend container configuration ──────────────────
frontend:
  enabled: true
  image:
    repository: quay.io/domino/docker-registry-cleaner-frontend
    tag: v0.4.1
    pullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  # Subpath under the Domino hostname where the UI will be served.
  basePath: /registry-cleaner
  ingress:
    enabled: true
    className: nginx
    # Nginx rewrites /registry-cleaner/foo → /foo before forwarding to Flask.
    # FLASK_BASE_PATH (= frontend.basePath) tells Flask its SCRIPT_NAME so that
    # url_for() generates correct prefixed URLs — no configuration-snippet needed.
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /$2
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    tls: []
  networkPolicy:
    enabled: true
    # Label on the namespace that contains the nginx ingress controller.
    # Traffic is allowed from any pod in a namespace bearing this label.
    ingressNamespaceLabel:
      domino-platform: "true"

# ── StatefulSet pod configuration ──────────────────
imagePullSecrets:
  - name: domino-quay-repos

# fsGroup makes the PVC at /data/reports writable by nonroot (65532)
podSecurityContext:
  fsGroup: 65532

serviceAccount:
  create: true
  name: docker-registry-cleaner
  # Optional: override full name; by default uses release-name + chart name
  fullnameOverride: ""

persistence:
  enabled: true
  size: 10Gi
  storageClass: "dominodisk"  # Use default storage class if empty

# Backend API configuration
# The backend container exposes a REST API on port 8081 for the frontend sidecar.
# Port 8081 is also the Prometheus /metrics scrape endpoint.
# This port is NOT exposed by any Kubernetes Service — it is reachable via
# kubectl port-forward, or from a Prometheus scraper allowed by metrics.networkPolicy.
backendApi:
  port: 8081
  # Name of the Kubernetes Secret that holds the API key used to authenticate
  # frontend→backend requests. The chart creates this secret automatically with a
  # random 32-character key on first install and preserves it across upgrades and
  # reinstalls (helm.sh/resource-policy: keep). Override apiKeySecret to use a
  # pre-existing secret instead.
  apiKeySecret: "registry-cleaner-api-key"

# Prometheus metrics scraping configuration
# The backend exposes GET /metrics on port 8081 (backendApi.port).
#
# NetworkPolicy: set enabled=true so the Prometheus scraper can reach port 8081.
# - Same-namespace Prometheus (e.g. running in domino-platform): set prometheusPodLabels
#   to match the Prometheus pod labels. namespaceSelector is not used in this case.
#   Example: prometheusPodLabels: { app: prometheus }
# - Different-namespace Prometheus: set prometheusNamespaceLabel instead.
#   Example: prometheusNamespaceLabel: { kubernetes.io/metadata.name: monitoring }
# - Leave both empty to allow all pods in the same namespace to reach port 8081.
metrics:
  networkPolicy:
    enabled: true
    # Defaults match the Prometheus server pod labels on standard Domino deployments
    # (prometheus Helm chart in domino-platform namespace). Override if your cluster
    # runs Prometheus in a different namespace or with different labels.
    prometheusPodLabels:
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/component: server
    # For cross-namespace Prometheus: set this instead of prometheusPodLabels.
    # e.g. prometheusNamespaceLabel: { kubernetes.io/metadata.name: monitoring }
    prometheusNamespaceLabel: {}

# ── Application configuration ──────────────────
config:
  # Inline config.yaml content mounted into the container
  registry:
    url: "docker-registry:5000"
    repository: "dominodatalab"
  mongo:
    host: "mongodb-replicaset"
    port: 27017
    replicaset: "rs0"
    db: "domino"
  analysis:
    max_workers: 4
    timeout: 300
    output_dir: "/data/reports"
  retry:
    max_retries: 3
    initial_delay: 1.0
    max_delay: 60.0
    exponential_base: 2.0
    jitter: true
    timeout: 300
  cache:
    enabled: true
    tag_list_ttl: 1800
    tag_list_max_size: 100
    image_inspect_ttl: 3600
    image_inspect_max_size: 1000
    mongo_query_ttl: 600
    mongo_query_max_size: 500
    layer_calc_ttl: 7200
    layer_calc_max_size: 2000
  s3:
    bucket: ""
    region: "us-west-2"
  skopeo:
    rate_limit:
      enabled: true  # Enable rate limiting for registry operations
      requests_per_second: 10.0  # Maximum requests per second (adjust based on registry capacity)
      burst_size: 20  # Allow burst of up to N requests (helps with parallel operations)
  reports:
    archived_tags: "archived-tags.json"
    deletion_analysis: "deletion-analysis.json"
    unused_environments: "unused-environments.json"
    old_revisions: "old-revisions.json"
  security:
    dry_run_by_default: true
    require_confirmation: true
